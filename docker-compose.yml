services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: notavia_web
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

  server:
    build: ./apps/server
    container_name: notavia_server
    environment:
      PORT: 3001
      DB_DRIVER: sqlite
      DB_PATH: /app/data/notavia.db
      UPLOAD_DIR: /app/data/uploads
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env before starting Notavia}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:1.5b}
      QDRANT_URL: http://qdrant:6333
      WHISPER_BASE_URL: http://whisper:9000/v1
    volumes:
      - type: bind
        source: ${NOTAVIA_DATA_DIR:-./.notavia-data}/app
        target: /app/data
    depends_on:
      ollama-init:
        condition: service_started
      qdrant:
        condition: service_started
      whisper:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 10s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  # ── Database (Optional: PostgreSQL for enterprise) ────────
  postgres:
    image: postgres:15-alpine
    container_name: notavia_postgres
    profiles: ["postgres"] # Only starts with: docker compose --profile postgres up
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-notavia}
    ports:
      - "5432:5432"
    volumes:
      - type: bind
        source: ${NOTAVIA_DATA_DIR:-./.notavia-data}/postgres
        target: /var/lib/postgresql/data
    restart: unless-stopped

  # ── Redis (for background job queue & caching) ────────────
  redis:
    image: redis:7-alpine
    container_name: notavia_redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - type: bind
        source: ${NOTAVIA_DATA_DIR:-./.notavia-data}/redis
        target: /data
    restart: unless-stopped

  # ── Ollama (Local AI Runtime) ─────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: notavia_ollama
    ports:
      - "11434:11434"
    volumes:
      - type: bind
        source: ${NOTAVIA_DATA_DIR:-./.notavia-data}/ollama
        target: /root/.ollama
    restart: unless-stopped
    # Uncomment below for GPU acceleration (NVIDIA):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # Download the configured local model in the background on first startup.
  ollama-init:
    image: ollama/ollama:latest
    container_name: notavia_ollama_init
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        until ollama list >/dev/null 2>&1; do sleep 2; done;
        ollama pull ${OLLAMA_MODEL:-qwen2.5:1.5b}
    depends_on:
      - ollama
    restart: "on-failure:3"

  # ── Qdrant (Vector Database for Semantic Search) ──────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: notavia_qdrant
    ports:
      - "6333:6333"
    volumes:
      - type: bind
        source: ${NOTAVIA_DATA_DIR:-./.notavia-data}/qdrant
        target: /qdrant/storage
    restart: unless-stopped

  # ── Whisper (Local Audio Transcription) ───────────────────
  whisper:
    image: hub.rat.dev/onerahmet/openai-whisper-asr-webservice:latest
    container_name: notavia_whisper
    ports:
      - "9005:9000"
    environment:
      - ASR_MODEL=small # Options: tiny, base, small, medium, large
      - ASR_ENGINE=openai_whisper
    volumes:
      - type: bind
        source: ${NOTAVIA_DATA_DIR:-./.notavia-data}/whisper
        target: /root/.cache/whisper
    restart: unless-stopped
