name: Security

on:
  push:
    branches: [master, main]
  pull_request:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "1"
      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/server/go.mod
          cache-dependency-path: apps/server/go.sum
      - name: Go license policy
        working-directory: apps/server
        run: go run github.com/google/go-licenses@v1.6.0 check --ignore github.com/notavia/server ./...
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm licenses list --prod
      - uses: anchore/sbom-action@v0.20.11
        with:
          path: .
          artifact-name: notavia-sbom.spdx.json

  images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t notavia-server:scan apps/server
      - run: docker build -t notavia-web:scan -f apps/web/Dockerfile .
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: notavia-server:scan
          severity: CRITICAL,HIGH
          exit-code: "1"
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: notavia-web:scan
          severity: CRITICAL,HIGH
          exit-code: "1"
