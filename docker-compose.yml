services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: notavia_web
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

  server:
    build: ./apps/server
    container_name: notavia_server
    environment:
      PORT: 3001
      DB_DRIVER: sqlite
      DB_PATH: /app/data/notavia.db
      UPLOAD_DIR: /app/data/uploads
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env before starting Notavia}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      OLLAMA_URL: http://ollama:11434
      QDRANT_URL: http://qdrant:6333
      WHISPER_BASE_URL: http://whisper:9000/v1
    volumes:
      - notavia_data:/app/data
    depends_on:
      - ollama
      - qdrant
      - whisper
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 10s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  # ── Database (Optional: PostgreSQL for enterprise) ────────
  postgres:
    image: postgres:15-alpine
    container_name: notavia_postgres
    profiles: ["postgres"] # Only starts with: docker compose --profile postgres up
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-notavia}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # ── Redis (for background job queue & caching) ────────────
  redis:
    image: redis:7-alpine
    container_name: notavia_redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # ── Ollama (Local AI Runtime) ─────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: notavia_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # Uncomment below for GPU acceleration (NVIDIA):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # ── Qdrant (Vector Database for Semantic Search) ──────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: notavia_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # ── Whisper (Local Audio Transcription) ───────────────────
  whisper:
    image: hub.rat.dev/onerahmet/openai-whisper-asr-webservice:latest
    container_name: notavia_whisper
    ports:
      - "9005:9000"
    environment:
      - ASR_MODEL=small # Options: tiny, base, small, medium, large
      - ASR_ENGINE=openai_whisper
    volumes:
      - whisper_data:/root/.cache/whisper
    restart: unless-stopped

volumes:
  notavia_data:
  postgres_data:
  redis_data:
  ollama_data:
  qdrant_data:
  whisper_data:
